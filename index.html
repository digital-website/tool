<!DOCTYPE html>
<html>
<head>
  <title>PDF Tools</title>
<link href="styl.css" rel="stylesheet">
<style>

</style>
</head>
<body>
  <h2>Interactive PDF Tools</h2>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="showTab('merge')">Merge & Compress PDFs</div>
    <div class="tab" onclick="showTab('jpg2pdf')">JPG to PDF</div>
    <div class="tab" onclick="showTab('pdf2jpg')">PDF to JPG</div>
  </div>

  <!-- Merge Tab -->
  <div id="merge" class="tab-content active">
    <h3>PDF Merger (Drag & Drop + Compression)</h3>
    <input type="file" id="pdfFiles" multiple accept="application/pdf" onchange="showFiles()">
    <ul id="fileList"></ul>
    <button onclick="mergePDFs(false)">Merge PDFs</button>
    <button onclick="mergePDFs(true)">Merge & Reduce Size</button>
  </div>

  <!-- JPG to PDF Tab -->
  <div id="jpg2pdf" class="tab-content">
    <h3>Convert Images to PDF</h3>
    <input type="file" id="imgFiles" multiple accept="image/*" onchange="showImages()">
    <ul id="imgList"></ul>
    <button onclick="imagesToPdf()">Convert to PDF</button>
  </div>

  <!-- PDF to JPG Tab -->
  <div id="pdf2jpg" class="tab-content">
    <h3>Convert PDF Pages to JPG</h3>
    <input type="file" id="pdfToJpg" multiple accept="application/pdf" onchange="showPdfList()">
    <ul id="pdfList"></ul>
    <button onclick="pdfsToImages()">Convert to JPG</button>
    <div id="jpgOutput"></div>
  </div>

  <!-- Libraries -->
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script src="code.js"></script>
